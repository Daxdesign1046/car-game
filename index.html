<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Racer: Custom Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            background: #0f172a;
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 600px;
            background: #000;
            overflow: hidden;
            border: 4px solid #38bdf8;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Animated Retro Grid Background for Menus */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98) 0%, rgba(30, 41, 59, 0.98) 100%);
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.1) 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: center;
            animation: gridScroll 4s linear infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }
        @keyframes gridScroll {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }
        .hidden { display: none !important; }
        h1 {
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6), 0 0 20px rgba(56, 189, 248, 0.3);
            letter-spacing: 2px;
        }
        h2 { font-size: 20px; margin-bottom: 15px; color: #f43f5e; letter-spacing: 1px; }
        .menu-btn {
            width: 80%;
            padding: 14px;
            margin: 8px 0;
            font-size: 16px;
            font-weight: bold;
            background: #1e293b;
            border: 2px solid #38bdf8;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-btn:active, .menu-btn.selected {
            background: #38bdf8;
            color: #000;
            box-shadow: 0 0 15px #38bdf8;
        }
        .selector-group {
            width: 100%;
            margin-bottom: 25px;
        }
        .selector-row {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }
        .selector-row .menu-btn { padding: 8px; font-size: 12px; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
            z-index: 5;
        }
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            z-index: 5;
        }
        .ctrl-btn {
            width: 75px;
            height: 75px;
            background: rgba(30, 41, 59, 0.7);
            border: 2px solid #38bdf8;
            border-radius: 50%;
            color: #38bdf8;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active { background: rgba(56, 189, 248, 0.5); }
        #qteOverlay {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(220, 38, 38, 0.95);
            border: 3px solid #fff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            width: 80%;
            box-shadow: 0 0 20px #ef4444;
            z-index: 8;
        }
        #qteTimerBar {
            width: 100%;
            background: #22c55e;
            height: 10px;
            margin-top: 10px;
            border-radius: 2px;
            transition: width linear;
        }
        #qteBtn {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            width: 100%;
        }
        .leaderboard-list {
            width: 100%;
            max-height: 230px;
            overflow-y: auto;
            margin-bottom: 20px;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 14px;
        }
        #nameInputContainer input {
            padding: 8px;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
            width: 80%;
            background: #1e293b;
            border: 1px solid #38bdf8;
            color: #fff;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui" class="hidden">
        <div id="scoreBox">SCORE: 0</div>
        <div id="hudInfo">STD | MED</div>
    </div>

    <!-- MAIN MENU -->
    <div id="screenMain" class="screen">
        <h1>RETRO RACER</h1>
        <button class="menu-btn" onclick="showScreen('screenSelect')">PLAY</button>
        <button class="menu-btn" onclick="openLeaderboard()">LEADERBOARDS</button>
    </div>

    <!-- SELECTION MENU -->
    <div id="screenSelect" class="screen hidden">
        <h2>SELECT MAP</h2>
        <div class="selector-group">
            <div class="selector-row">
                <button id="map_standard" class="menu-btn selected" onclick="setMap('standard')">STANDARD</button>
                <button id="map_night" class="menu-btn" onclick="setMap('night')">NIGHT LIFE</button>
                <button id="map_beach" class="menu-btn" onclick="setMap('beach')">BEACH SIDE</button>
            </div>
        </div>

        <h2>SELECT DIFFICULTY</h2>
        <div class="selector-group">
            <div class="selector-row">
                <button id="diff_easy" class="menu-btn" onclick="setDifficulty('easy')">EASY</button>
                <button id="diff_medium" class="menu-btn selected" onclick="setDifficulty('medium')">MEDIUM</button>
                <button id="diff_hard" class="menu-btn" onclick="setDifficulty('hard')">HARD</button>
            </div>
        </div>

        <button class="menu-btn" style="background:#22c55e; border-color:#fff; margin-top:20px;" onclick="startGame()">LAUNCH</button>
        <button class="menu-btn" style="border-color:#64748b;" onclick="showScreen('screenMain')">BACK</button>
    </div>

    <!-- LEADERBOARD MENU -->
    <div id="screenLeaderboard" class="screen hidden">
        <h2>LEADERBOARD</h2>
        <div class="selector-row" style="width:100%; margin-bottom:10px; gap:10px;">
            <select id="boardMapSelect" onchange="refreshLeaderboardView()" style="flex:1; background:#1e293b; color:#fff; padding:8px; border:1px solid #38bdf8;"></select>
            <select id="boardDiffSelect" onchange="refreshLeaderboardView()" style="flex:1; background:#1e293b; color:#fff; padding:8px; border:1px solid #38bdf8;"></select>
        </div>
        <div class="leaderboard-list" id="leaderboardContent"></div>
        <button class="menu-btn" onclick="showScreen('screenMain')">MAIN MENU</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="screenGameOver" class="screen hidden">
        <h1 style="color:#ef4444;">GAME OVER</h1>
        <p id="finalScoreText" style="font-size:18px; margin-bottom:15px;">SCORE: 0</p>
        
        <div id="nameInputContainer" class="hidden">
            <p style="color:#e2e8f0; font-size:12px; margin-bottom:5px;">NEW HIGH SCORE! ENTER NAME:</p>
            <input type="text" id="playerNameInput" maxlength="8" placeholder="PLAYER">
            <button class="menu-btn" style="background:#22c55e;" onclick="submitScore()">SAVE SCORE</button>
        </div>

        <button id="normalGameOverBtn" class="menu-btn" onclick="showScreen('screenSelect')">CONTINUE</button>
    </div>

    <!-- QUICK TIME EVENT POPUP -->
    <div id="qteOverlay" class="hidden">
        <div style="font-weight:bold; font-size:18px; margin-bottom:5px;" id="qteAlertText">⚠️ ENGINE STALL!</div>
        <div style="font-size:12px; margin-bottom:10px;">DESKTOP: PRESS <span style="background:#fff; color:#000; padding:2px 4px; font-weight:bold;">SPACEBAR</span></div>
        <button id="qteBtn">TAP HERE RAPIDLY!</button>
        <div style="width:100%; background:#451a03; height:10px; margin-top:10px; border-radius:2px;"><div id="qteTimerBar"></div></div>
    </div>

    <!-- MOBILE CONTROLS -->
    <div id="mobileControls" class="hidden">
        <div class="ctrl-btn" id="leftBtn">◀</div>
        <div class="ctrl-btn" id="rightBtn">▶</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 600;

let currentMap = 'standard';
let currentDiff = 'medium';
let score = 0;
let gameOver = false;
let gameSpeed = 5;
let gameActive = false;

let qteActive = false;
let qteProgress = 0;
let qteTimer = 0;
let qteDuration = 1500; 
let nextQteTime = 0;

const maps = {
    standard: { lanes: [65, 175, 285], totalLanes: 3, roadWidth: 320, color: '#334155' },
    night: { lanes: [65, 175, 285], totalLanes: 3, roadWidth: 320, color: '#1e293b', isNight: true },
    beach: { lanes: [120, 230], totalLanes: 2, roadWidth: 220, color: '#475569', isBeach: true }
};

const difficulties = {
    easy: { startSpeed: 4, speedScale: 0.2, qteChance: 0.0005 },
    medium: { startSpeed: 6, speedScale: 0.4, qteChance: 0.001 },
    hard: { startSpeed: 9, speedScale: 0.7, qteChance: 0.002 }
};

const obstacleModels = [
    { type: 'sedan', color: '#ef4444', length: 75 },
    { type: 'truck', color: '#f59e0b', length: 110 },
    { type: 'police', color: '#3b82f6', length: 75, flash: true },
    { type: 'sports', color: '#a855f7', length: 70 }
];

let player = { x: 175, y: 470, width: 45, height: 75, speed: 7, movingLeft: false, movingRight: false };
let obstacles = [];
let roadLines = [0, 150, 300, 450];

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    
    const targetScreen = document.getElementById(screenId);
    if (targetScreen) {
        targetScreen.classList.remove('hidden');
    }
    
    if(screenId === 'screenSelect' || screenId === 'screenMain' || screenId === 'screenLeaderboard' || screenId === 'screenGameOver') {
        document.getElementById('ui').classList.add('hidden');
        document.getElementById('mobileControls').classList.add('hidden');
        gameActive = false;
    }
}

function setMap(mapId) {
    currentMap = mapId;
    document.querySelectorAll('[id^="map_"]').forEach(b => b.classList.remove('selected'));
    document.getElementById(`map_${mapId}`).classList.add('selected');
}

function setDifficulty(diffId) {
    currentDiff = diffId;
    document.querySelectorAll('[id^="diff_"]').forEach(b => b.classList.remove('selected'));
    document.getElementById(`diff_${diffId}`).classList.add('selected');
}

function openLeaderboard() {
    const mapSelect = document.getElementById('boardMapSelect');
    const diffSelect = document.getElementById('boardDiffSelect');
    mapSelect.innerHTML = Object.keys(maps).map(m => `<option value="${m}" ${m===currentMap?'selected':''}>${m.toUpperCase()}</option>`).join('');
    diffSelect.innerHTML = Object.keys(difficulties).map(d => `<option value="${d}" ${d===currentDiff?'selected':''}>${d.toUpperCase()}</option>`).join('');
    showScreen('screenLeaderboard');
    refreshLeaderboardView();
}

function refreshLeaderboardView() {
    const m = document.getElementById('boardMapSelect').value;
    const d = document.getElementById('boardDiffSelect').value;
    const boardKey = `leaderboard_${m}_${d}`;
    const data = JSON.parse(localStorage.getItem(boardKey)) || [];
    
    const container = document.getElementById('leaderboardContent');
    if(data.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:20px; color:#64748b;">NO ENTRIES YET</div>`;
    } else {
        container.innerHTML = data.map((item, index) => `
            <div class="leaderboard-item">
                <span>${index + 1}. ${item.name}</span>
                <span style="color:#38bdf8;">${item.score}</span>
            </div>
        `).join('');
    }
}

function triggerQTE() {
    if (qteActive || gameOver) return;
    qteActive = true;
    qteProgress = 0;
    qteTimer = Date.now();
    
    document.getElementById('qteOverlay').classList.remove('hidden');
    const bar = document.getElementById('qteTimerBar');
    bar.style.transition = 'none';
    bar.style.width = '100%';
    setTimeout(() => {
        bar.style.transition = `width ${qteDuration}ms linear`;
        bar.style.width = '0%';
    }, 10);
}

function runQteInput() {
    if (!qteActive) return;
    qteProgress += 25; 
    if (qteProgress >= 100) {
        endQTE(true);
    }
}

function endQTE(success) {
    qteActive = false;
    document.getElementById('qteOverlay').classList.add('hidden');
    if (success) {
        score += 150;
        document.getElementById('scoreBox').innerText = 'SCORE: ' + score;
    } else {
        triggerCrash();
    }
}

function startGame() {
    showScreen('none'); 
    document.getElementById('ui').classList.remove('hidden');
    document.getElementById('mobileControls').classList.remove('hidden');
    document.getElementById('hudInfo').innerText = `${currentMap.substring(0,3).toUpperCase()} | ${currentDiff.substring(0,4).toUpperCase()}`;
    
    score = 0;
    gameOver = false;
    gameActive = true;
    qteActive = false;
    obstacles = [];
    gameSpeed = difficulties[currentDiff].startSpeed;
    
    const activeMap = maps[currentMap];
    player.x = activeMap.lanes[Math.floor(activeMap.lanes.length / 2)] - player.width / 2;
    player.movingLeft = false;
    player.movingRight = false;
    
    document.getElementById('scoreBox').innerText = 'SCORE: 0';
    nextQteTime = Date.now() + 10000; 

    update();
}

function spawnObstacle() {
    const activeMap = maps[currentMap];
    const targetLane = activeMap.lanes[Math.floor(Math.random() * activeMap.lanes.length)];
    const model = obstacleModels[Math.floor(Math.random() * obstacleModels.length)];
    
    if (obstacles.length > 0) {
        const lowestObstacle = obstacles.reduce((prev, current) => (prev.y > current.y) ? prev : current);
        if (lowestObstacle.y < 160) return;
    }

    obstacles.push({
        x: targetLane - 45 / 2, 
        y: -model.length,
        width: 45,
        height: model.length,
        color: model.color,
        flash: model.flash,
        type: model.type
    });
}

function checkCollision(r1, r2) {
    return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
}

function triggerCrash() {
    gameOver = true;
    gameActive = false;
    document.getElementById('finalScoreText').innerText = 'SCORE: ' + score;
    
    const boardKey = `leaderboard_${currentMap}_${currentDiff}`;
    const records = JSON.parse(localStorage.getItem(boardKey)) || [];
    
    const isHighScore = records.length < 5 || score > records[records.length - 1].score;
    
    if (isHighScore && score > 0) {
        document.getElementById('nameInputContainer').classList.remove('hidden');
        document.getElementById('normalGameOverBtn').classList.add('hidden');
    } else {
        document.getElementById('nameInputContainer').classList.add('hidden');
        document.getElementById('normalGameOverBtn').classList.remove('hidden');
    }
    
    showScreen('screenGameOver');
}

function submitScore() {
    const nameInput = document.getElementById('playerNameInput');
    const name = nameInput.value.trim().toUpperCase() || 'PLAYER';
    const boardKey = `leaderboard_${currentMap}_${currentDiff}`;
    
    let records = JSON.parse(localStorage.getItem(boardKey)) || [];
    records.push({ name: name, score: score });
    records.sort((a, b) => b.score - a.score);
    records = records.slice(0, 5);
    
    localStorage.setItem(boardKey, JSON.stringify(records));
    nameInput.value = '';
    
    openLeaderboard();
}

function update() {
    if (!gameActive) return;

    if (qteActive) {
        if (Date.now() - qteTimer > qteDuration) {
            endQTE(false);
        }
    } else {
        const currentRoad = maps[currentMap];
        const roadLeftBound = (canvas.width - currentRoad.roadWidth) / 2;
        const roadRightBound = roadLeftBound + currentRoad.roadWidth;

        if (player.movingLeft && player.x > roadLeftBound + 5) player.x -= player.speed;
        if (player.movingRight && player.x < roadRightBound - player.width - 5) player.x += player.speed;

        for (let i = 0; i < roadLines.length; i++) {
            roadLines[i] += gameSpeed;
            if (roadLines[i] > canvas.height) roadLines[i] = -80;
        }

        if (Math.random() < 0.02) spawnObstacle();
        if (Date.now() > nextQteTime && Math.random() < difficulties[currentDiff].qteChance) {
            triggerQTE();
            nextQteTime = Date.now() + 15000;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].y += gameSpeed;

            if (checkCollision(player, obstacles[i])) {
                triggerCrash();
                return;
            }

            if (obstacles[i].y > canvas.height) {
                obstacles.splice(i, 1);
                score += 10;
                document.getElementById('scoreBox').innerText = 'SCORE: ' + score;
                if (score % 100 === 0) gameSpeed += difficulties[currentDiff].speedScale;
            }
        }
    }

    draw();
    requestAnimationFrame(update);
}

function drawCarBody(ctx, x, y, width, height, color, isPlayer) {
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(x - 3, y + 10, 4, 14);
    ctx.fillRect(x + width, y + 10, 4, 14);
    ctx.fillRect(x - 3, y + height - 20, 4, 14);
    ctx.fillRect(x + width, y + height - 20, 4, 14);

    ctx.fillStyle = color;
    ctx.fillRect(x, y, width, height);

    ctx.fillStyle = '#cbd5e1';
    if(isPlayer) {
        ctx.fillRect(x + 4, y + 20, width - 8, 15); 
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(x + 6, y + 23, width - 12, 10);
    } else {
        ctx.fillRect(x + 4, y + height - 35, width - 8, 15); 
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(x + 6, y + height - 33, width - 12, 10);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const road = maps[currentMap];
    const roadX = (canvas.width - road.roadWidth) / 2;

    if (road.isBeach) {
        ctx.fillStyle = '#0284c7'; 
        ctx.fillRect(0, 0, roadX, canvas.height);
        ctx.fillStyle = '#fef08a'; 
        ctx.fillRect(roadX + road.roadWidth, 0, canvas.width - (roadX + road.roadWidth), canvas.height);
    } else {
        ctx.fillStyle = '#16a34a'; 
        ctx.fillRect(0, 0, roadX, canvas.height);
        ctx.fillRect(roadX + road.roadWidth, 0, canvas.width - (roadX + road.roadWidth), canvas.height);
    }

    ctx.fillStyle = road.color;
    ctx.fillRect(roadX, 0, road.roadWidth, canvas.height);

    ctx.fillStyle = '#ef4444';
    ctx.fillRect(roadX - 4, 0, 4, canvas.height);
    ctx.fillRect(roadX + road.roadWidth, 0, 4, canvas.height);

    ctx.fillStyle = '#f59e0b';
    for (let i = 0; i < roadLines.length; i++) {
        if (road.totalLanes === 3) {
            ctx.fillRect(roadX + 105, roadLines[i], 6, 60);
            ctx.fillRect(roadX + 210, roadLines[i], 6, 60);
        } else if (road.totalLanes === 2) {
            ctx.fillRect(roadX + 107, roadLines[i], 6, 60);
        }
    }

    drawCarBody(ctx, player.x, player.y, player.width, player.height, '#10b981', true);

    for (let i = 0; i < obstacles.length; i++) {
        let obs = obstacles[i];
        let renderColor = obs.color;
        if (obs.flash && Math.floor(Date.now() / 150) % 2 === 0) {
            renderColor = '#ef4444'; 
        }
        drawCarBody(ctx, obs.x, obs.y, obs.width, obs.height, renderColor, false);
    }

    if (road.isNight) {
        ctx.fillStyle = 'rgba(5, 5, 20, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let gradient = ctx.createLinearGradient(0, player.y, 0, player.y - 160);
        gradient.addColorStop(0, 'rgba(255, 255, 200, 0.6)');
        gradient.addColorStop(1, 'rgba(255, 255, 200, 0.0)');
        ctx.fillStyle = gradient;
        
        ctx.beginPath();
        ctx.moveTo(player.x + 5, player.y);
        ctx.lineTo(player.x - 40, player.y - 160);
        ctx.lineTo(player.x + player.width + 40, player.y - 160);
        ctx.lineTo(player.x + player.width - 5, player.y);
        ctx.closePath();
        ctx.fill();
    }
}

window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.movingLeft = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.movingRight = true;
    if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        runQteInput();
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.movingLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.movingRight = false;
});

const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const qteBtn = document.getElementById('qteBtn');

leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); player.movingLeft = true; });
leftBtn.addEventListener('touchend', () => player.movingLeft = false);
rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); player.movingRight = true; });
rightBtn.addEventListener('touchend', () => player.movingRight = false);
qteBtn.addEventListener('touchstart', (e) => { e.preventDefault(); runQteInput(); });
qteBtn.addEventListener('click', runQteInput);

showScreen('screenMain');
</script>
</body>
</html>
