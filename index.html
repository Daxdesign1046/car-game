<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Car Dodger</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 600px;
            background: #222;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #333;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
        }
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            background: rgba(255, 255, 255, 0.5);
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #gameOverScreen h1 {
            color: #ff3333;
            margin-bottom: 20px;
        }
        #restartBtn {
            padding: 10px 20px;
            font-size: 18px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="scoreBox">Score: 0</div>
        <div id="highScoreBox">High: 0</div>
    </div>
    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p id="finalScore">Your Score: 0</p>
        <button id="restartBtn">Play Again</button>
    </div>
    <div id="mobileControls">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="rightBtn">▶</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 400;
canvas.height = 600;

let score = 0;
let highScore = localStorage.getItem('highScore') || 0;
document.getElementById('highScoreBox').innerText = 'High: ' + highScore;

let gameOver = false;
let gameSpeed = 5;

const player = {
    x: 175,
    y: 480,
    width: 50,
    height: 80,
    speed: 7,
    movingLeft: false,
    movingRight: false
};

let obstacles = [];
const obstacleColors = ['#ff3333', '#3333ff', '#f59e0b', '#ec4899'];

function spawnObstacle() {
    const width = 50;
    const height = 80;
    const lanes = [50, 175, 300];
    const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
    
    if (obstacles.length > 0) {
        const lastObstacle = obstacles[obstacles.length - 1];
        if (lastObstacle.y < 180) return;
    }

    obstacles.push({
        x: randomLane,
        y: -height,
        width: width,
        height: height,
        color: obstacleColors[Math.floor(Math.random() * obstacleColors.length)]
    });
}

let roadLines = [0, 150, 300, 450];

window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.movingLeft = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.movingRight = true;
});

window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.movingLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.movingRight = false;
});

const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');

leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); player.movingLeft = true; });
leftBtn.addEventListener('touchend', () => player.movingLeft = false);
rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); player.movingRight = true; });
rightBtn.addEventListener('touchend', () => player.movingRight = false);

document.getElementById('restartBtn').addEventListener('click', resetGame);

function resetGame() {
    score = 0;
    gameOver = false;
    gameSpeed = 5;
    obstacles = [];
    player.x = 175;
    player.movingLeft = false;
    player.movingRight = false;
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('scoreBox').innerText = 'Score: 0';
    update();
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function update() {
    if (gameOver) return;

    if (player.movingLeft && player.x > 20) player.x -= player.speed;
    if (player.movingRight && player.x < canvas.width - player.width - 20) player.x += player.speed;

    for (let i = 0; i < roadLines.length; i++) {
        roadLines[i] += gameSpeed;
        if (roadLines[i] > canvas.height) {
            roadLines[i] = -50;
        }
    }

    if (Math.random() < 0.02) {
        spawnObstacle();
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += gameSpeed;

        if (checkCollision(player, obstacles[i])) {
            gameOver = true;
            handleGameOver();
        }

        if (obstacles[i].y > canvas.height) {
            obstacles.splice(i, 1);
            score += 10;
            document.getElementById('scoreBox').innerText = 'Score: ' + score;
            
            if (score % 100 === 0) gameSpeed += 0.5;
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = '#333';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#22c55e';
    ctx.fillRect(0, 0, 20, canvas.height);
    ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);

    ctx.fillStyle = '#f59e0b';
    for (let i = 0; i < roadLines.length; i++) {
        ctx.fillRect(130, roadLines[i], 8, 80);
        ctx.fillRect(260, roadLines[i], 8, 80);
    }

    ctx.fillStyle = '#10b981';
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x + 5, player.y + 15, player.width - 10, 15);
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x - 4, player.y + 10, 4, 15);
    ctx.fillRect(player.x + player.width, player.y + 10, 4, 15);
    ctx.fillRect(player.x - 4, player.y + 55, 4, 15);
    ctx.fillRect(player.x + player.width, player.y + 55, 4, 15);

    for (let i = 0; i < obstacles.length; i++) {
        let obs = obstacles[i];
        ctx.fillStyle = obs.color;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.fillStyle = '#fff';
        ctx.fillRect(obs.x + 5, obs.y + 50, obs.width - 10, 15);
        ctx.fillStyle = '#000';
        ctx.fillRect(obs.x - 4, obs.y + 10, 4, 15);
        ctx.fillRect(obs.x + obs.width, obs.y + 10, 4, 15);
        ctx.fillRect(obs.x - 4, obs.y + 55, 4, 15);
        ctx.fillRect(obs.x + obs.width, obs.y + 55, 4, 15);
    }
}

function handleGameOver() {
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('highScore', highScore);
        document.getElementById('highScoreBox').innerText = 'High: ' + highScore;
    }
    document.getElementById('finalScore').innerText = 'Your Score: ' + score;
    document.getElementById('gameOverScreen').style.display = 'flex';
}

update();
</script>
</body>
</html>
